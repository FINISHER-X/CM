<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Made Store</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="hero">

        <div class="container nav-container">

            <a href="index.html" class="logo" aria-label="Custom Made home"></a>

            <button class="nav-toggle" type="button" aria-label="Toggle navigation" aria-expanded="false" aria-controls="navMenu">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <nav class="navbar" id="navMenu">

                <ul class="nav-links">

                    <li><a href="index.html">HOME</a></li>
                    <li><a href="about.html">ABOUT</a></li>
                    <li><a href="service.html">SERVICE</a></li>
                    <li><a href="design.html" class="active">DESIGN</a></li>
                    <li><a href="contact.html">CONTACT</a></li>

                </ul>

            </nav>

            <form class="search-box">

                <input type="text" placeholder="Search...">

                <button type="submit">

                    <i class="fa-solid fa-magnifying-glass"></i>

                </button>

            </form>

        </div>

    </header>

    <section class="products-page">

        <div class="categories">

            <div class="category active">
                <i class="fa-solid fa-border-all"></i>
                <p>All Products</p>
            </div>

            <div class="category">
                <i class="fa-solid fa-book"></i>
                <p>Journals</p>
            </div>

            <div class="category">
                <i class="fa-solid fa-note-sticky"></i>
                <p>Jotters</p>
            </div>

            <div class="category">
                <i class="fa-regular fa-bookmark"></i>
                <p>Notebooks</p>
            </div>

            <div class="category">
                <i class="fa-regular fa-calendar"></i>
                <p>Planners</p>
            </div>

            <div class="category">
                <i class="fa-solid fa-book-open"></i>
                <p>Diaries</p>
            </div>

            <div class="category">
                <i class="fa-solid fa-pen-ruler"></i>
                <p>Stationery</p>
            </div>

        </div>

        <div class="top-bar">

            <button class="filter-btn">
                <i class="fa-solid fa-filter"></i>
                Filter
            </button>

            <p id="resultCount"></p>

            <select id="sort">
                <option>Featured</option>
                <option>Low Price</option>
                <option>High Price</option>
            </select>

        </div>

        <div class="products" id="products"></div>

        <div class="cta">

            <div>
                <h2>Looking for something unique?</h2>
                <p>We offer fully customizable journals and stationery.</p>
            </div>

            <button>
                CUSTOMIZE NOW
                <i class="fa-solid fa-arrow-right"></i>
            </button>

        </div>

    </section>

<script src="index.js"></script>

</body>

<script>

    const products = [

        {
            name: "Classic Journal",
            type: "A5 Linen Cover",
            price: 4500,
            category: "Journals",
            image: "CM101.png"
        },

        {
            name: "Floral Jotter",
            type: "Pocket Size",
            price: 6500,
            category: "Jotters",
            image: "CM1.png"
        },

        {
            name: "Daily Planner",
            type: "A5 Dated",
            price: 6000,
            category: "Planners",
            image: "CM101.png"
        },

        {
            name: "Hardcover Notebook",
            type: "Ruled Pages",
            price: 4500,
            category: "Notebooks",
            image: "CM1.png"
        },

        {
            name: "Leather Diary",
            type: "Premium",
            price: 8000,
            category: "Diaries",
            image: "CM101.png"
        },

        {
            name: "Weekly Planner",
            type: "Undated",
            price: 5990,
            category: "Planners",
            image: "CM1.png"
        },

        {
            name: "Spiral Notebook",
            type: "Ruled",
            price: 6000,
            category: "Notebooks",
            image: "CM.png"
        },

        {
            name: "Pocket Jotter",
            type: "Mini",
            price: 6990,
            category: "Jotters",
            image: "CM1.png"
        },

        {
            name: "Dot Grid Notebook",
            type: "Dot Grid",
            price: 4490,
            category: "Notebooks",
            image: "CM101.png"
        },

        {
            name: "Kids Notebook",
            type: "Ruled",
            price: 4500,
            category: "Notebooks",
            image: "CM101.png"
        },

        {
            name: "Stationery Set",
            type: "Gift Set",
            price: 5000,
            category: "Stationery",
            image: "CM1.png"
        },

        {
            name: "Sticker Pack",
            type: "Assorted",
            price: 6000,
            category: "Stationery",
            image: "CM101.png"
        }

    ];

    const container = document.getElementById("products");

    function displayProducts(items) {

        container.innerHTML = "";

        items.forEach(product => {

            container.innerHTML += `

<div class="card">

<img src="${product.image}" alt="">

<div class="card-content">

<h3>${product.name}</h3>

<p>${product.type}</p>

<div class="price">₦${product.price}</div>

</div>

</div>

`;

        });

        document.getElementById("resultCount").innerHTML =
            `Showing 1-${items.length} of ${items.length} products`;

    }

    displayProducts(products);

    // Sorting

    document.getElementById("sort").addEventListener("change", function () {

        let value = this.value;

        if (value === "Low Price") {

            products.sort((a, b) => a.price - b.price);

        }

        if (value === "High Price") {

            products.sort((a, b) => b.price - a.price);

        }

        displayProducts(products);

    });

    // Category Filter

    const categories = document.querySelectorAll(".category");

    categories.forEach(category => {

        category.addEventListener("click", () => {

            categories.forEach(btn => btn.classList.remove("active"));

            category.classList.add("active");

            const text = category.innerText.trim();

            if (text === "All Products") {

                displayProducts(products);

            } else {

                const filtered = products.filter(item => item.category === text);

                displayProducts(filtered);

            }

        });

    });

</script>

</body>

</html>
